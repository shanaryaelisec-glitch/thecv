<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shanczan</title>
    <link rel="stylesheet" href="stylish.css">
</head>

<body>
    <div class="form-container">
        <h2>Create Your Curriculum Vitae</h2>
        <form action="cv.php" method="POST" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Full Name" required>
            </div>
            
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" min="16" max="80" placeholder="Age" required>
            </div>
            
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input type="text" id="address" name="address" placeholder="Address" required>
            </div>
            
            <div class="form-group">
                <label for="program">Program/Course</label>
                <input type="text" id="program" name="program" placeholder="Program/Course" required>
            </div>

            <div class="form-group">
                <label for="education">Educational Background</label>
                <textarea id="education" name="education" placeholder="Educational Background" rows="4" required></textarea>
            </div>

            <div class="form-group">
                <label for="skills">Skills</label>
                <textarea id="skills" name="skills" placeholder="(Ex:HTML, CSS, JavaScript)" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="languages">Languages</label>
                <textarea id="languages" name="languages" placeholder="(Ex:English, Filipino)" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Phone Number" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Email Address" required>
            </div>
            
            <div class="form-group">
                <label for="facebook">Facebook Profile</label>
                <input type="url" id="facebook" name="facebook" placeholder="https://facebook.com/yourprofile">
            </div>

            <div class="form-group">
                <label for="profile">Upload Profile Picture</label>
                <input type="file" id="profile" name="profile" accept="image/*">
                <small style="color: #666;">Optional - JPG, PNG, GIF (Max 5MB)</small>
            </div>

            <button type="submit" name="submit">🚀 Generate CV</button>
        </form>
    </div>
</body>
</html>
